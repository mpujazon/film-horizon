<footer class="mt-16 w-full border-t border-border bg-background px-6 py-12">
  <div class="container mx-auto max-w-5xl">
    <div class="mb-8 flex items-center gap-6 text-foreground/80">
      @for (item of socialItems; track item.label) {
        <button
          type="button"
          class="flex h-6 w-6 cursor-pointer items-center justify-center rounded-full text-xs font-semibold hover:text-primary transition-colors"
          [attr.aria-label]="item.label"
          [title]="item.label"
        >
          <svg
            aria-hidden="true"
            viewBox="0 0 16 16"
            class="h-4 w-4 fill-current"
          >
            <path [attr.d]="item.svgPath" />
          </svg>
        </button>
      }
    </div>

    <div class="mb-8 grid grid-cols-2 gap-4 text-sm text-muted-foreground md:grid-cols-4">
      @for (section of linkSections; track section.title) {
        <ul class="space-y-3" [attr.aria-label]="section.title">
          @for (link of section.links; track link) {
            <li>
              <button
                type="button"
                class="cursor-pointer text-left hover:text-foreground transition-colors"
              >
                {{ link }}
              </button>
            </li>
          }
        </ul>
      }
    </div>

    <div class="mb-6 text-xs text-muted-foreground/60">
      <p>© 2026 FilmHorizon</p>
    </div>
  </div>
</footer>
