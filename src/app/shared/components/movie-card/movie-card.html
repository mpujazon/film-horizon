<article
  class="movie-card group relative isolate w-full cursor-pointer overflow-hidden rounded-[1.25rem] border border-white/15 shadow-2xl transition-all duration-500 hover:-translate-y-1.5 hover:shadow-black/60"
  role="link"
  tabindex="0"
  [attr.aria-label]="'Open details for ' + title()"
  (click)="onCardClick()"
  (keydown)="onCardKeydown($event)"
>
  <div class="absolute inset-0">
    @if (posterUrl() && !imageLoadFailed()) {
      <img
        [ngSrc]="posterUrl()"
        [alt]="title()"
        fill
        sizes="(max-width: 768px) 80vw, (max-width: 1280px) 30vw, 18vw"
        class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110"
        (error)="onImageError()"
      />
    } @else {
      <div class="fallback-grid absolute inset-0 grid place-items-center">
        <p class="font-[Cormorant_Garamond] text-2xl font-semibold uppercase tracking-[0.15em] text-white/80">{{ title() }}</p>
      </div>
    }
  </div>

  <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/45 to-black/15 opacity-80 transition-opacity duration-500 group-hover:opacity-95"></div>
  <div class="grain-layer absolute inset-0"></div>

  <div class="absolute left-4 top-4 z-20 flex items-center gap-2 rounded-full border border-white/20 bg-black/45 px-2.5 py-1 text-xs font-semibold text-zinc-100 backdrop-blur-md">
    <svg viewBox="0 0 24 24" class="h-3.5 w-3.5 fill-amber-400 text-amber-300" aria-hidden="true">
      <path d="M12 2.75L14.782 8.386L21 9.29L16.5 13.676L17.563 19.868L12 16.943L6.437 19.868L7.5 13.676L3 9.29L9.218 8.386L12 2.75Z" />
    </svg>
    <span>{{ formattedRating() }}</span>
  </div>

  <div class="relative z-20 flex h-full flex-col justify-end p-4 sm:p-5">
    <div class="flex h-full translate-y-12 flex-col justify-end transition-transform duration-500 ease-out group-hover:translate-y-0">
      <h3 class="line-clamp-2 text-xl font-black leading-tight text-white drop-shadow-md">
        {{ title() }}
      </h3>

      <div class="mb-5 mt-2 flex items-center gap-2 text-xs font-medium text-white/85">
        <span class="rounded-sm bg-white/20 px-2 py-0.5 backdrop-blur-md">{{ mediaType() }}</span>
        <span aria-hidden="true">•</span>
        <span class="truncate">{{ releaseYear() }}</span>
      </div>

      <div class="grid w-full min-w-0 grid-cols-[minmax(0,1fr)_2.5rem_auto] items-center gap-2.5 opacity-0 transition-opacity duration-500 delay-100 group-hover:opacity-100">
        <button
          type="button"
          class="flex h-10 min-w-0 items-center justify-center gap-2 rounded-xl bg-primary px-3 text-sm font-bold text-primary-foreground shadow-lg shadow-primary/30 transition-all hover:bg-primary/90 active:scale-95 disabled:cursor-not-allowed disabled:opacity-60"
          (click)="$event.stopPropagation(); onTrailerClick()"
          [attr.aria-label]="'Play trailer for ' + title()"
          [disabled]="isTrailerLoading()"
        >
          <svg viewBox="0 0 24 24" class="h-4 w-4 fill-current" aria-hidden="true">
            <path d="M7 5.5V18.5L18 12L7 5.5Z" />
          </svg>
          {{ isTrailerLoading() ? 'Opening...' : 'Trailer' }}
        </button>

        <app-watchlist-button
          class="flex-none"
          [mediaId]="movie().id"
          [mediaType]="movie().media_type"
          [mediaTitle]="title()"
          variant="icon"
          (changed)="onWatchlistChanged($event)"
          (click)="$event.stopPropagation()"
        />

      </div>
    </div>
  </div>

  <app-trailer-modal
    [isOpen]="isTrailerModalOpen()"
    [videoKey]="trailerKey()"
    [title]="title()"
    (closed)="closeTrailerModal()"
  />
</article>
