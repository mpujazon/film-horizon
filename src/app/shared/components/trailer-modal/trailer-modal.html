<dialog
  #dialogRef
  class="z-50 m-auto w-[min(92vw,72rem)] overflow-hidden rounded-2xl border border-white/20 bg-black shadow-2xl"
  [attr.aria-label]="'Watch trailer for ' + title()"
  (click)="$event.stopPropagation(); onDialogClick($event, dialogRef)"
  (close)="onDialogClosed()"
>
  <div class="flex items-center justify-between border-b border-white/15 px-4 py-3 text-white sm:px-5">
    <p class="truncate text-sm font-semibold sm:text-base">{{ title() }} Trailer</p>
    <button
      type="button"
      class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-white/20 bg-white/5 text-white transition hover:bg-white/15 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
      (click)="close()"
      aria-label="Close trailer modal"
      autofocus
    >
      <svg viewBox="0 0 24 24" class="h-5 w-5" aria-hidden="true">
        <path
          d="M6.707 5.293L12 10.586L17.293 5.293L18.707 6.707L13.414 12L18.707 17.293L17.293 18.707L12 13.414L6.707 18.707L5.293 17.293L10.586 12L5.293 6.707L6.707 5.293Z"
          fill="currentColor"
        />
      </svg>
    </button>
  </div>

  @if (isOpen() && embedUrl(); as trailerEmbedUrl) {
    <div class="aspect-video w-full bg-black">
      <iframe
        class="h-full w-full"
        [src]="trailerEmbedUrl"
        [title]="iframeTitle()"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin"
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
        allowfullscreen
      ></iframe>
    </div>
  }
</dialog>
