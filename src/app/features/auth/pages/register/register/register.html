<section class="min-h-screen bg-background px-4 pb-10 pt-28 sm:px-6">
  <div class="mx-auto w-full max-w-md rounded-2xl border border-border bg-card p-6 shadow-lg sm:p-8">
    <div class="flex justify-center p-6">
      <span class="bg-primary text-primary-foreground font-extrabold text-[2rem] px-2.5 py-1 rounded tracking-tight">FilmHorizon</span>
    </div>
    <p class="text-sm font-medium text-muted-foreground">Welcome back</p>
    <h1 class="mt-1 text-3xl font-semibold text-foreground">Sign up</h1>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-5">
      <div class="space-y-2">
        <label for="email" class="block text-sm font-medium text-foreground">Email</label>
        <input
          formControlName="email"
          id="email"
          name="email"
          type="email"
          class="w-full rounded-lg border border-input bg-input-background px-3 py-2.5 text-foreground placeholder:text-muted-foreground focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/30"
        />
        @if (showError('email')){
          <p class="text-xs py-1 text-destructive">{{ getError('email') }}</p>
        }
      </div>

      <div class="space-y-2">
        <label for="password" class="block text-sm font-medium text-foreground">Password</label>
        <input
          formControlName="password"
          id="password"
          name="password"
          type="password"
          class="w-full rounded-lg border border-input bg-input-background px-3 py-2.5 text-foreground placeholder:text-muted-foreground focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/30"
        />
        @if (showError('password')){
          <p class="text-xs py-1 text-destructive">{{ getError('password') }}</p>
        }
      </div>

      <div class="space-y-2">
        <label for="confirmPassword" class="block text-sm font-medium text-foreground">Confirm password</label>
        <input
          formControlName="confirmPassword"
          id="confirmPassword"
          name="confirmPassword"
          type="password"
          class="w-full rounded-lg border border-input bg-input-background px-3 py-2.5 text-foreground placeholder:text-muted-foreground focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/30"
        />
        @if (showError('confirmPassword')){
          <p class="text-xs py-1 text-destructive">{{ getError('confirmPassword') }}</p>
        }
      </div>

      <button
        [disabled]="registerForm.invalid"
        type="submit"
        class="mt-2 w-full rounded-lg bg-primary px-4 py-2.5 text-sm font-semibold text-primary-foreground transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:ring-offset-2 focus:ring-offset-card disabled:bg-primary/25"
      >
        @if (isSubmitting) {
          <span class="inline-flex items-center gap-2">
            <span class="h-4 w-4 animate-spin rounded-full border-2 border-current border-t-transparent"></span>
          </span>
          Signing up..
        } @else {
          Sign up
        }
      </button>
    </form>
    <p class="text-destructive py-2">{{registerErrorMessage()}}</p>
    <p class="text-xs py-2">Have an account? <span routerLink="/login" class="underline hover:cursor-pointer hover:text-primary">Log in here</span></p>
  </div>
</section>
