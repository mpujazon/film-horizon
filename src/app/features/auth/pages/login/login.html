<div style="height: 100px"></div>
<form (ngSubmit)="onSubmit()">
  <div>
    <label for="email">Email</label>
    <input
      id="email"
      name="email"
      type="email"
      [(ngModel)]="email"
    />
  </div>

  <div>
    <label for="password">Password</label>
    <input
      id="password"
      name="password"
      type="password"
      [(ngModel)]="password"
    />
  </div>

  <button type="submit">Entrar</button>
</form>
